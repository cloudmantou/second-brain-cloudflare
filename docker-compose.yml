services:
  singularity:
    build: .
    ports:
      # Bind loopback only — put Nginx/Caddy in front for public HTTPS.
      - "127.0.0.1:${PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/memory.db
      HOST: 0.0.0.0
      PORT: "8787"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
